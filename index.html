    vocab:[
      {word:"reach out",pron:"[리치 아웃]",meaning:"연락하다, 손을 내밀다",ex:"I'll reach out to you later. (나중에 연락할게요.)"},

    vocab:[
      {word:"limits",pron:"[리미츠]",meaning:"제한하다",ex:"Time limits our choices. (시간이 우리의 선택을 제한한다.)"},

    grammar:[{title:"관계대명사 which (계속적 용법)",desc:"콤마 + which는 앞 문장 전체를 받아 추가 설명을 해요. '그런데 그것이 ~'라고 해석합니다.",ex:"He was late, which surprised us. (그는 늦었는데, 그것이 우리를 놀라게 했다.)"}],

  {

      {word:"extend",pron:"[익스텐드]",meaning:"연장하다, 늘리다",ex:"Can you extend the deadline? (마감을 연장할 수 있나요?)"},
      {word:"I'd like to ask you to",pron:"[아이드 라이크 투 애스크 유 투]",meaning:"~해 주실 것을 요청드립니다",ex:"I'd like to ask you to review this. (이것을 검토해 주실 것을 요청드립니다.)"}

  {
    num:"19번 지문",

      {word:"rush of excitement",pron:"[러쉬 어브 익사이트먼트]",meaning:"흥분이 밀려옴",ex:"I felt a rush of excitement. (흥분이 밀려왔다.)"},

  },

      {word:"own",pron:"[오운]",meaning:"소유하다",ex:"Do you own this car? (이 차가 당신 것인가요?)"},

  {

let idx = 0;
let koVisible = false;

function render() {
  const s = sentences[idx];
  document.getElementById('prog-text').textContent = (idx+1) + ' / ' + sentences.length;
  document.getElementById('prog-fill').style.width = ((idx+1)/sentences.length*100)+'%';
  document.getElementById('s-num').textContent = '📌 ' + s.num;
  document.getElementById('s-en').textContent = s.en;
  document.getElementById('s-ko').textContent = s.ko;
  document.getElementById('s-ko').classList.remove('show');
  document.getElementById('toggle-btn').textContent = '🇰🇷 번역 보기';
  koVisible = false;

  document.getElementById('vocab-list').innerHTML = s.vocab.map(function(v) {
    return '<div class="vocab-item"><div class="vocab-word">'+v.word+'</div><div class="vocab-pron">'+v.pron+'</div><div class="vocab-meaning">'+v.meaning+'</div><div class="vocab-example">'+v.ex+'</div></div>';
  }).join('');

  document.getElementById('grammar-list').innerHTML = s.grammar.map(function(g) {
    return '<div class="grammar-item"><div class="grammar-title">'+g.title+'</div><div class="grammar-desc">'+g.desc+'</div><div class="grammar-ex">'+g.ex+'</div></div>';
  }).join('');

  document.getElementById('tip-list').innerHTML = s.tip.map(function(t) {
    return '<div class="tip-item"><p>💡 '+t+'</p></div>';
  }).join('');

  document.getElementById('btn-prev').disabled = idx === 0;
  var nb = document.getElementById('btn-next');
  nb.textContent = idx === sentences.length-1 ? '완료 ✓' : '다음 →';
  nb.disabled = idx === sentences.length-1;
  switchTab('vocab');
}

function toggleKo() {
  koVisible = !koVisible;
  document.getElementById('s-ko').classList.toggle('show', koVisible);
  document.getElementById('toggle-btn').textContent = koVisible ? '🇰🇷 번역 숨기기' : '🇰🇷 번역 보기';
}

function go(dir) {
  idx = Math.max(0, Math.min(sentences.length-1, idx+dir));
  render();
}

function switchTab(name) {
  var names = ['vocab','grammar','tip'];
  var tabs = document.querySelectorAll('.tab');
  names.forEach(function(n,i) {
    tabs[i].classList.toggle('active', n===name);
    document.getElementById('tab-'+n).classList.toggle('active', n===name);
  });
}

render();
</script>
