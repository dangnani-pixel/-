<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>영어 학습 카드</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #F5F4F0;
  min-height: 100vh;
  padding: 16px;
  color: #1a1a1a;
}
.source-tag {
  display: inline-block;
  font-size: 12px;
  color: #534AB7;
  background: #EEEDFE;
  border-radius: 99px;
  padding: 4px 12px;
  margin-bottom: 14px;
}
.top-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 16px;
}
.prog-text {
  font-size: 13px;
  color: #888;
  white-space: nowrap;
  min-width: 52px;
}
.progress-bar {
  flex: 1;
  height: 6px;
  background: #E0DED8;
  border-radius: 99px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: #7F77DD;
  border-radius: 99px;
  transition: width 0.3s ease;
}
.sentence-card {
  background: #fff;
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 14px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.07);
}
.s-num {
  font-size: 11px;
  color: #aaa;
  margin-bottom: 8px;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}
.s-en {
  font-size: 18px;
  color: #1a1a1a;
  line-height: 1.65;
  margin-bottom: 14px;
}
.toggle-btn {
  display: inline-block;
  font-size: 14px;
  color: #534AB7;
  background: #EEEDFE;
  border: none;
  border-radius: 99px;
  padding: 7px 16px;
  cursor: pointer;
  font-weight: 500;
  -webkit-tap-highlight-color: transparent;
}
.s-ko {
  font-size: 15px;
  color: #534AB7;
  line-height: 1.65;
  display: none;
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px solid #EEEDFE;
}
.s-ko.show { display: block; }
.tab-row {
  display: flex;
  gap: 0;
  background: #fff;
  border-radius: 12px;
  padding: 4px;
  margin-bottom: 14px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.07);
}
.tab {
  flex: 1;
  padding: 10px 4px;
  font-size: 14px;
  text-align: center;
  cursor: pointer;
  color: #888;
  border-radius: 9px;
  transition: all 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.tab.active {
  background: #7F77DD;
  color: #fff;
  font-weight: 500;
}
.panel { display: none; }
.panel.active { display: block; }
.section-label {
  font-size: 11px;
  color: #aaa;
  text-transform: uppercase;
  letter-spacing: 0.07em;
  margin-bottom: 10px;
}
.vocab-item {
  background: #fff;
  border-radius: 12px;
  padding: 14px 16px;
  margin-bottom: 10px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}
.vocab-word { font-size: 17px; font-weight: 600; color: #1a1a1a; }
.vocab-pron { font-size: 12px; color: #aaa; margin: 3px 0; }
.vocab-meaning { font-size: 14px; color: #444; }
.vocab-example { font-size: 13px; color: #7F77DD; margin-top: 6px; font-style: italic; }
.grammar-item {
  background: #fff;
  border-radius: 12px;
  padding: 14px 16px;
  margin-bottom: 10px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}
.grammar-title { font-size: 15px; font-weight: 600; color: #1a1a1a; margin-bottom: 5px; }
.grammar-desc { font-size: 14px; color: #555; line-height: 1.6; }
.grammar-ex { font-size: 13px; color: #7F77DD; margin-top: 6px; font-style: italic; }
.tip-item {
  background: #fff;
  border-radius: 12px;
  padding: 14px 16px;
  margin-bottom: 10px;
  border-left: 4px solid #7F77DD;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}
.tip-item p { font-size: 14px; color: #444; line-height: 1.65; }
.nav-row {
  display: flex;
  gap: 10px;
  margin-top: 16px;
  padding-bottom: 8px;
}
.nav-btn {
  flex: 1;
  padding: 15px;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: opacity 0.15s, transform 0.1s;
}
.nav-btn:active { transform: scale(0.97); }
.nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.nav-btn.secondary { background: #E0DED8; color: #555; }
.nav-btn.primary { background: #7F77DD; color: #fff; }
</style>
</head>
<body>

<div class="source-tag">📰 AI for Work 뉴스레터 · 2026.06.24</div>
<div class="top-bar">
  <span class="prog-text" id="prog-text">1 / 50</span>
  <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
</div>

<div class="sentence-card">
  <div class="s-num" id="s-num">문장 1</div>
  <div class="s-en" id="s-en"></div>
  <button class="toggle-btn" id="toggle-btn" onclick="toggleKo()">🇰🇷 번역 보기</button>
  <div class="s-ko" id="s-ko"></div>
</div>

<div class="tab-row">
  <div class="tab active" onclick="switchTab('vocab')">📖 단어</div>
  <div class="tab" onclick="switchTab('grammar')">📝 문법</div>
  <div class="tab" onclick="switchTab('tip')">💡 팁</div>
</div>

<div class="panel active" id="tab-vocab">
  <div class="section-label">핵심 단어</div>
  <div id="vocab-list"></div>
</div>
<div class="panel" id="tab-grammar">
  <div class="section-label">문법 포인트</div>
  <div id="grammar-list"></div>
</div>
<div class="panel" id="tab-tip">
  <div class="section-label">학습 팁</div>
  <div id="tip-list"></div>
</div>

<div class="nav-row">
  <button class="nav-btn secondary" id="btn-prev" onclick="go(-1)">← 이전</button>
  <button class="nav-btn primary" id="btn-next" onclick="go(1)">다음 →</button>
</div>

<script>
const sentences = [
  {
    num:1,
    en:"AI is raising the bar at work, and not just for machines.",
    ko:"AI는 직장에서 기준을 높이고 있으며, 그것은 기계에만 해당하는 이야기가 아닙니다.",
    vocab:[
      {word:"raise the bar",pron:"[레이즈 더 바]",meaning:"기준을 높이다",ex:"This product raises the bar for quality. (이 제품은 품질 기준을 높인다.)"},
      {word:"not just for",pron:"[낫 저스트 포]",meaning:"~만을 위한 것이 아닌",ex:"Not just for experts. (전문가들만을 위한 게 아니야.)"}
    ],
    grammar:[{title:"not just A, but (also) B",desc:"'A만이 아니라 B도'라는 표현이에요. 여기서는 뒷부분이 생략된 형태입니다.",ex:"Not just students but teachers too. (학생뿐 아니라 선생님도.)"}],
    tip:["raise the bar는 '기대치/기준을 올리다'는 관용표현이에요. 뉴스·비즈니스에서 자주 나옵니다.","not just for ~는 '~만의 이야기가 아니다'를 강조할 때 씁니다."]
  },
  {
    num:2,
    en:"As hiring slows, employers are looking for people who can pair AI fluency with judgment and strong communication skills.",
    ko:"채용이 둔화되면서, 고용주들은 AI 활용 능력을 판단력과 강한 소통 능력과 결합할 수 있는 사람을 찾고 있습니다.",
    vocab:[
      {word:"hiring",pron:"[하이어링]",meaning:"채용, 고용",ex:"The company is not hiring now. (그 회사는 지금 채용하지 않는다.)"},
      {word:"fluency",pron:"[플루언시]",meaning:"유창함, 능숙함",ex:"AI fluency is important today. (오늘날 AI 능숙도가 중요하다.)"},
      {word:"pair A with B",pron:"[페어 에이 위드 비]",meaning:"A와 B를 결합하다",ex:"Pair skills with experience. (기술과 경험을 결합해라.)"}
    ],
    grammar:[
      {title:"As + 절",desc:"'~하면서', '~함에 따라'는 뜻이에요. 두 일이 동시에 일어날 때 씁니다.",ex:"As time passes, things change. (시간이 지남에 따라 상황이 바뀐다.)"},
      {title:"현재진행형: be + ~ing",desc:"'지금 ~하고 있다'는 뜻. 현재 진행 중인 상황을 표현합니다.",ex:"They are looking for new ideas. (그들은 새 아이디어를 찾고 있다.)"}
    ],
    tip:["pair A with B는 비즈니스 영어에서 자주 나오는 표현이에요.","fluency는 언어뿐 아니라 'AI fluency'처럼 다양한 분야에서 씁니다."]
  },
  {
    num:3,
    en:"Anthropic unveiled Claude Tag, a system that embeds its flagship model into Slack.",
    ko:"Anthropic은 슬랙에 자사의 대표 모델을 내장하는 시스템인 Claude Tag를 공개했습니다.",
    vocab:[
      {word:"unveiled",pron:"[언베일드]",meaning:"공개했다, 발표했다",ex:"Apple unveiled a new phone. (애플이 새 폰을 공개했다.)"},
      {word:"flagship",pron:"[플래그십]",meaning:"대표적인, 주력의",ex:"This is their flagship product. (이게 그들의 주력 제품이다.)"},
      {word:"embed",pron:"[임베드]",meaning:"내장하다, 삽입하다",ex:"The chip is embedded in the device. (칩이 기기에 내장되어 있다.)"}
    ],
    grammar:[
      {title:"동격 (콤마 + 명사구)",desc:"콤마 뒤에 앞 명사를 설명하는 명사구가 와요.",ex:"Seoul, the capital of Korea, is beautiful. (한국의 수도인 서울은 아름답다.)"},
      {title:"관계대명사 that",desc:"앞의 명사(a system)를 꾸며주는 절을 이끕니다.",ex:"a tool that helps you work (일을 도와주는 도구)"}
    ],
    tip:["unveil은 '베일을 벗기다'가 원래 뜻으로, 신제품·서비스 발표에 자주 씁니다.","flagship은 '주력 상품'을 뜻하는 비즈니스 핵심 용어예요."]
  },
  {
    num:4,
    en:"This allows users to grant the model access to certain channels and delegate tasks to it by tagging Claude.",
    ko:"이를 통해 사용자는 모델에게 특정 채널에 대한 접근 권한을 부여하고, Claude를 태그해서 작업을 위임할 수 있습니다.",
    vocab:[
      {word:"grant access to",pron:"[그랜트 액세스 투]",meaning:"~에 접근 권한을 주다",ex:"Grant access to the folder. (폴더에 접근 권한을 줘.)"},
      {word:"delegate",pron:"[델리게이트]",meaning:"위임하다, 맡기다",ex:"He delegated the task to his team. (그는 팀에 일을 위임했다.)"},
      {word:"certain",pron:"[서튼]",meaning:"특정한, 어떤",ex:"Certain rules must be followed. (특정 규칙을 따라야 한다.)"}
    ],
    grammar:[
      {title:"allow + 목적어 + to 동사",desc:"'~가 …할 수 있게 하다'는 뜻이에요.",ex:"This app allows you to save time. (이 앱은 시간을 절약하게 해준다.)"},
      {title:"by + ~ing (수단 표현)",desc:"'~함으로써'라는 뜻으로, 방법이나 수단을 나타냅니다.",ex:"Learn English by watching movies. (영화를 봄으로써 영어를 배워라.)"}
    ],
    tip:["grant + 목적어 + access to ~는 IT/비즈니스에서 정말 많이 나오는 표현이에요.","delegate는 사람에게도, AI에게도 업무를 맡길 때 씁니다."]
  },
  {
    num:5,
    en:"Claude builds context by remembering relevant information from the channels it's a part of.",
    ko:"Claude는 자신이 속한 채널의 관련 정보를 기억함으로써 맥락을 쌓아갑니다.",
    vocab:[
      {word:"build context",pron:"[빌드 컨텍스트]",meaning:"맥락을 쌓다, 배경을 이해하다",ex:"Read more to build context. (더 읽어서 맥락을 파악해.)"},
      {word:"relevant",pron:"[렐러번트]",meaning:"관련 있는, 적절한",ex:"Give me relevant information. (관련 있는 정보를 줘.)"},
      {word:"be a part of",pron:"[비 어 파트 어브]",meaning:"~의 일부이다, ~에 속하다",ex:"I want to be a part of this team. (이 팀의 일원이 되고 싶어.)"}
    ],
    grammar:[{title:"by + ~ing",desc:"'~함으로써'라는 수단 표현이에요. by 뒤에 동사에 -ing를 붙입니다.",ex:"He learned English by reading books. (그는 책을 읽음으로써 영어를 배웠다.)"}],
    tip:["build context는 AI·IT 분야에서 자주 쓰는 표현이에요.","relevant는 important와 비슷하지만, '주제와 관련 있는'이라는 뉘앙스가 있어요."]
  },
  {
    num:6,
    en:"Anthropic positions Claude Tag as a digital teammate, akin to human coworkers, rather than a tool.",
    ko:"Anthropic은 Claude Tag를 도구가 아닌, 사람 동료와 비슷한 디지털 팀원으로 자리매김하고 있습니다.",
    vocab:[
      {word:"position A as B",pron:"[포지션 에이 애즈 비]",meaning:"A를 B로 자리매김하다",ex:"They positioned it as a premium product. (그들은 그것을 프리미엄 제품으로 포지셔닝했다.)"},
      {word:"akin to",pron:"[어킨 투]",meaning:"~와 유사한, 비슷한",ex:"This feeling is akin to joy. (이 감정은 기쁨과 비슷하다.)"},
      {word:"rather than",pron:"[래더 댄]",meaning:"~보다는, ~ 대신에",ex:"Use email rather than phone. (전화보다 이메일을 써라.)"}
    ],
    grammar:[{title:"A rather than B",desc:"'B가 아니라 A'라는 뜻으로, 선호나 대조를 나타냅니다.",ex:"Walk rather than drive. (운전보다 걸어라.)"}],
    tip:["position A as B는 마케팅·비즈니스 기사에서 자주 보이는 표현이에요.","akin to는 similar to보다 좀 더 격식체 표현입니다."]
  },
  {
    num:7,
    en:"The more we think of these tools as coworkers, the more we must trust them.",
    ko:"이 도구들을 동료로 생각할수록, 우리는 더 많이 신뢰해야 합니다.",
    vocab:[
      {word:"think of A as B",pron:"[띵크 어브 에이 애즈 비]",meaning:"A를 B로 생각하다",ex:"I think of her as a friend. (나는 그녀를 친구로 생각한다.)"},
      {word:"trust",pron:"[트러스트]",meaning:"신뢰하다, 믿다",ex:"Do you trust this app? (이 앱을 믿어?)"}
    ],
    grammar:[{title:"The 비교급 ~, the 비교급 …",desc:"'~할수록 더 …하다'는 표현이에요. 영어에서 매우 중요한 패턴입니다.",ex:"The harder you work, the better the results. (더 열심히 할수록 결과가 더 좋다.)"}],
    tip:["The more ~, the more … 패턴은 꼭 외워두세요!","think of A as B = consider A to be B와 같은 뜻이에요."]
  },
  {
    num:8,
    en:"This mindset shift brings up two potential concerns.",
    ko:"이러한 사고방식의 전환은 두 가지 잠재적인 우려를 불러일으킵니다.",
    vocab:[
      {word:"mindset shift",pron:"[마인드셋 쉬프트]",meaning:"사고방식의 전환",ex:"A mindset shift is needed. (사고방식의 전환이 필요하다.)"},
      {word:"bring up",pron:"[브링 업]",meaning:"불러일으키다, 제기하다",ex:"He brought up an important point. (그는 중요한 점을 제기했다.)"},
      {word:"potential",pron:"[퍼텐셜]",meaning:"잠재적인, 가능성 있는",ex:"There are potential risks. (잠재적인 위험이 있다.)"}
    ],
    grammar:[{title:"bring up",desc:"'화제를 꺼내다', '제기하다'는 뜻의 구동사예요.",ex:"She brought up the issue at the meeting. (그녀는 회의에서 그 문제를 제기했다.)"}],
    tip:["mindset은 요즘 한국어에서도 자주 쓰는 단어예요!","bring up은 '키우다'와 '화제를 꺼내다' 두 가지 뜻이 있어요."]
  },
  {
    num:9,
    en:"The more we trust these tools, the more risk we undertake at the same time.",
    ko:"이 도구들을 더 많이 신뢰할수록, 동시에 더 많은 위험을 감수하게 됩니다.",
    vocab:[
      {word:"undertake",pron:"[언더테이크]",meaning:"감수하다, 떠맡다",ex:"We undertake great risks. (우리는 큰 위험을 감수한다.)"},
      {word:"at the same time",pron:"[앳 더 세임 타임]",meaning:"동시에",ex:"Don't talk and eat at the same time. (동시에 말하고 먹지 마.)"}
    ],
    grammar:[{title:"The 비교급 ~, the 비교급 … (심화)",desc:"앞 문장과 이어지는 패턴이에요. 조건과 결과를 동시에 표현합니다.",ex:"The more you save, the richer you get. (더 많이 저축할수록 더 부유해진다.)"}],
    tip:["undertake는 격식체 표현이에요. 회화에서는 take on을 더 많이 씁니다.","at the same time은 문장 앞이나 뒤 어디에나 올 수 있어요."]
  },
  {
    num:10,
    en:"This shift risks further growing the narrative that AI is ready to replace employees.",
    ko:"이러한 전환은 AI가 직원을 대체할 준비가 됐다는 이야기를 더욱 키울 위험이 있습니다.",
    vocab:[
      {word:"risk + ~ing",pron:"[리스크]",meaning:"~할 위험이 있다",ex:"You risk losing everything. (모든 것을 잃을 위험이 있다.)"},
      {word:"narrative",pron:"[내러티브]",meaning:"이야기, 서사, 담론",ex:"The media created a new narrative. (미디어가 새로운 담론을 만들었다.)"},
      {word:"replace",pron:"[리플레이스]",meaning:"대체하다, 교체하다",ex:"AI may replace some jobs. (AI가 일부 직업을 대체할 수 있다.)"}
    ],
    grammar:[{title:"risk + 동명사(~ing)",desc:"'~할 위험을 감수하다'는 표현이에요. risk 뒤에는 반드시 -ing가 옵니다.",ex:"Don't risk making that mistake. (그 실수를 할 위험을 감수하지 마.)"}],
    tip:["narrative는 요즘 '사회적 담론'이라는 의미로 자주 쓰여요.","risk + ~ing 패턴은 비즈니스·뉴스 영어에서 자주 나옵니다."]
  },
  {
    num:11,
    en:"Sue Duke pointed to internal data showing that hiring across Europe is down 25% from pandemic-era highs.",

let idx = 0;
let koVisible = false;

function render() {
  const s = sentences[idx];
  document.getElementById('prog-text').textContent = (idx+1) + ' / ' + sentences.length;
  document.getElementById('prog-fill').style.width = ((idx+1)/sentences.length*100)+'%';
  document.getElementById('s-num').textContent = '문장 ' + s.num;
  document.getElementById('s-en').textContent = s.en;
  document.getElementById('s-ko').textContent = s.ko;
  document.getElementById('s-ko').classList.remove('show');
  document.getElementById('toggle-btn').textContent = '🇰🇷 번역 보기';
  koVisible = false;

  document.getElementById('vocab-list').innerHTML = s.vocab.map(function(v) {
    return '<div class="vocab-item"><div class="vocab-word">' + v.word + '</div><div class="vocab-pron">' + v.pron + '</div><div class="vocab-meaning">' + v.meaning + '</div><div class="vocab-example">' + v.ex + '</div></div>';
  }).join('');

  document.getElementById('grammar-list').innerHTML = s.grammar.map(function(g) {
    return '<div class="grammar-item"><div class="grammar-title">' + g.title + '</div><div class="grammar-desc">' + g.desc + '</div><div class="grammar-ex">' + g.ex + '</div></div>';
  }).join('');

  document.getElementById('tip-list').innerHTML = s.tip.map(function(t) {
    return '<div class="tip-item"><p>💡 ' + t + '</p></div>';
  }).join('');

  document.getElementById('btn-prev').disabled = idx === 0;
  var nb = document.getElementById('btn-next');
  nb.textContent = idx === sentences.length-1 ? '완료 ✓' : '다음 →';
  nb.disabled = idx === sentences.length-1;

  switchTab('vocab');
}

function toggleKo() {
  koVisible = !koVisible;
  document.getElementById('s-ko').classList.toggle('show', koVisible);
  document.getElementById('toggle-btn').textContent = koVisible ? '🇰🇷 번역 숨기기' : '🇰🇷 번역 보기';
}

function go(dir) {
  idx = Math.max(0, Math.min(sentences.length-1, idx+dir));
  render();
}

function switchTab(name) {
  var names = ['vocab','grammar','tip'];
  var tabs = document.querySelectorAll('.tab');
  names.forEach(function(n, i) {
    tabs[i].classList.toggle('active', n===name);
    document.getElementById('tab-'+n).classList.toggle('active', n===name);
  });
}

render();
</script>
